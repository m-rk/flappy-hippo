<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=../" />
    <link rel="canonical" href="https://m-rk.github.io/flappy-hippo/" />
    <title>Flappy Hippo - Redirecting</title>
    <script>
      const target = new URL("../", window.location.href);
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target);
    </script>
  </head>
  <body>
    <a href="../">Flappy Hippo</a>
  </body>
</html>
